<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据中心 — 智权绿融</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
  <style>
    :root{--sidebar-bg:#1b3a2d;--sidebar-width:220px;--topbar-h:64px;--green-dark:#1b4332;--green-mid:#2d6a4f;--green-light:#52b788;--green-pale:#b7e4c7;--gold:#c9a84c;--bg:#f0f4f2;--white:#ffffff;--card-shadow:0 2px 12px rgba(27,67,50,0.08);--text-dark:#1a2e23;--text-mid:#4a6358;--text-light:#8a9e94;--blue:#2563eb;--red:#dc2626;--green:#059669;--orange:#d97706;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar-width);background:var(--sidebar-bg);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:20px 20px 18px;border-bottom:1px solid rgba(255,255,255,0.06);}
    .logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:16px;color:white;}
    .logo-text{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;color:white;letter-spacing:1px;}
    .sidebar-nav{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:4px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,0.55);font-size:14px;font-weight:500;text-decoration:none;transition:all 0.2s;}
    .nav-item:hover{background:rgba(82,183,136,0.1);color:rgba(255,255,255,0.9);}
    .nav-item.active{background:rgba(82,183,136,0.18);color:var(--green-pale);}
    .nav-item i{width:18px;font-size:14px;text-align:center;}
    .nav-divider{height:1px;background:rgba(255,255,255,0.06);margin:10px 0;}
    .sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);}
    .user-info{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:14px;color:white;font-weight:600;}
    .user-name{font-size:13px;font-weight:600;color:white;}.user-role{font-size:11px;color:rgba(255,255,255,0.45);}
    .main{margin-left:var(--sidebar-width);flex:1;display:flex;flex-direction:column;}
    .topbar{height:var(--topbar-h);background:white;position:sticky;top:0;z-index:99;display:flex;align-items:center;justify-content:space-between;padding:0 32px;border-bottom:1px solid #e8f0ea;box-shadow:0 1px 6px rgba(27,67,50,0.05);}
    .topbar-left{display:flex;flex-direction:column;}.topbar-title{font-size:18px;font-weight:700;color:var(--text-dark);}.topbar-sub{font-size:12px;color:var(--text-light);margin-top:1px;}
    .topbar-right{display:flex;align-items:center;gap:16px;}
    .user-chip{display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 12px;border-radius:8px;border:1px solid #dde8e0;background:var(--bg);}
    .user-chip-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--green-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:12px;color:white;font-weight:600;}
    .user-chip-name{font-size:13px;font-weight:600;color:var(--text-dark);}
    .topbar-icon{cursor:pointer;color:var(--text-mid);font-size:16px;position:relative;}
    .badge-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid white;}
    .content{padding:28px 32px;flex:1;}
    .card{background:white;border-radius:14px;padding:24px;box-shadow:var(--card-shadow);border:1px solid rgba(27,67,50,0.05);}
    .card-title{font-size:15px;font-weight:700;color:var(--text-dark);margin-bottom:4px;}
    .card-sub{font-size:12px;color:var(--text-light);margin-bottom:20px;}
    .btn{padding:10px 22px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
    .btn-outline{background:white;color:var(--text-mid);border:1.5px solid #dde8e0;}
    .btn-outline:hover{border-color:var(--green-light);color:var(--green-dark);}
    .btn-primary{background:linear-gradient(135deg,var(--green-light),var(--green-mid));color:white;}

    /* Filter bar */
    .filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding:16px 20px;background:white;border-radius:12px;box-shadow:var(--card-shadow);}
    .filter-bar label{font-size:13px;color:var(--text-mid);font-weight:500;}
    .filter-select{padding:7px 12px;border:1.5px solid #dde8e0;border-radius:8px;font-size:13px;color:var(--text-dark);font-family:inherit;outline:none;background:var(--bg);}
    .filter-select:focus{border-color:var(--green-light);}
    .filter-bar .sep{width:1px;height:24px;background:#e8f0ea;}

    /* Big KPI row */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px;}
    .kpi-card{background:white;border-radius:14px;padding:22px;box-shadow:var(--card-shadow);position:relative;overflow:hidden;}
    .kpi-card::after{content:'';position:absolute;right:-16px;bottom:-16px;width:80px;height:80px;border-radius:50%;opacity:0.08;}
    .kpi-card:nth-child(1)::after{background:var(--green-mid);}
    .kpi-card:nth-child(2)::after{background:var(--blue);}
    .kpi-card:nth-child(3)::after{background:var(--gold);}
    .kpi-card:nth-child(4)::after{background:var(--red);}
    .kpi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:16px;}
    .kpi-label{font-size:12px;color:var(--text-light);margin-bottom:6px;}
    .kpi-val{font-family:'Noto Serif SC',serif;font-size:30px;font-weight:700;color:var(--text-dark);margin-bottom:6px;}
    .kpi-trend{font-size:12px;display:flex;align-items:center;gap:4px;}
    .trend-up{color:var(--green);}
    .trend-down{color:var(--red);}

    /* Charts grid */
    .charts-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    .charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;}
    #financeChart{height:280px;}
    #regionChart{height:280px;}
    #monthlyChart{height:260px;}
    #typeChart{height:260px;}
    #successChart{height:260px;}

    /* Map placeholder */
    .map-placeholder{height:200px;background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:rgba(27,67,50,0.4);}
    .map-placeholder i{font-size:40px;}
    .map-placeholder span{font-size:13px;}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo">
      <img src="logo.png" alt="项目logo" style="width: 36px; height: 36px; border-radius: 10px; object-fit: cover;">
      <span class="logo-text">智权绿融</span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><i class="fas fa-th-large"></i> 工作台总览</a>
      <a href="data-center.html" class="nav-item active"><i class="fas fa-chart-bar"></i> 数据分析</a>
      <a href="apply.html" class="nav-item"><i class="fas fa-file-alt"></i> 项目管理</a>
      <a href="#" class="nav-item"><i class="fas fa-building"></i> 企业管理</a>
      <a href="#" class="nav-item"><i class="fas fa-tasks"></i> 进度跟踪</a>
      <div class="nav-divider"></div>
      <a href="risk.html" class="nav-item"><i class="fas fa-shield-alt"></i> 风险监控</a>
      <a href="evaluation.html" class="nav-item"><i class="fas fa-star"></i> 评估报告</a>
      <div class="nav-divider"></div>
      <a href="index.html" class="nav-item"><i class="fas fa-home"></i> 返回首页</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">张</div>
        <div><div class="user-name">张经理</div><div class="user-role">高级风控专员</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">数据中心</div>
        <div class="topbar-sub">全平台融资数据分析与可视化</div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-outline"><i class="fas fa-download"></i> 导出数据</button>
        <button class="btn btn-primary"><i class="fas fa-sync-alt"></i> 刷新</button>
        <div class="topbar-icon"><i class="fas fa-bell"></i><span class="badge-dot"></span></div>
        <div class="user-chip">
          <div class="user-chip-avatar">张</div>
          <span class="user-chip-name">张经理</span>
        </div>
      </div>
    </div>

    <div class="content">
      <!-- Filter -->
      <div class="filter-bar">
        <label>时间范围</label>
        <select class="filter-select" onchange="updateCharts(this.value)">
          <option value="2024">2024年</option>
          <option value="2023">2023年</option>
          <option value="q4">2024年Q4</option>
          <option value="q3">2024年Q3</option>
        </select>
        <div class="sep"></div>
        <label>企业类型</label>
        <select class="filter-select">
          <option>全部类型</option>
          <option>种业企业</option>
          <option>农业科技</option>
          <option>科研机构</option>
        </select>
        <div class="sep"></div>
        <label>地区</label>
        <select class="filter-select">
          <option>全国</option>
          <option>华南</option>
          <option>华北</option>
          <option>西南</option>
          <option>华东</option>
        </select>
        <div style="margin-left:auto">
          <button class="btn btn-primary" style="padding:8px 18px"><i class="fas fa-search"></i> 查询</button>
        </div>
      </div>

      <!-- KPI -->
      <div class="kpi-row">
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#ecfdf5"><i class="fas fa-yen-sign" style="color:var(--green)"></i></div>
          <div class="kpi-label">年度融资总额</div>
          <div class="kpi-val">¥24.5<span style="font-size:16px">亿</span></div>
          <div class="kpi-trend trend-up"><i class="fas fa-arrow-up"></i> 同比增长 23.6%</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#eff6ff"><i class="fas fa-file-check" style="color:var(--blue)"></i></div>
          <div class="kpi-label">成功放款项目</div>
          <div class="kpi-val">1,234<span style="font-size:16px">个</span></div>
          <div class="kpi-trend trend-up"><i class="fas fa-arrow-up"></i> 较去年 +312 项</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#fffbeb"><i class="fas fa-clock" style="color:var(--orange)"></i></div>
          <div class="kpi-label">平均放款天数</div>
          <div class="kpi-val">3.2<span style="font-size:16px">天</span></div>
          <div class="kpi-trend trend-up"><i class="fas fa-arrow-down"></i> 较去年缩短 1.3天</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-icon" style="background:#fef2f2"><i class="fas fa-percent" style="color:var(--red)"></i></div>
          <div class="kpi-label">不良贷款率</div>
          <div class="kpi-val">0.8<span style="font-size:16px">%</span></div>
          <div class="kpi-trend trend-up"><i class="fas fa-arrow-down"></i> 低于行业均值 2.1%</div>
        </div>
      </div>

      <!-- Main charts -->
      <div class="charts-grid-2">
        <div class="card">
          <div class="card-title">月度融资金额趋势</div>
          <div class="card-sub">2024年各月融资总额（单位：万元）</div>
          <div id="financeChart"></div>
        </div>
        <div class="card">
          <div class="card-title">地区分布</div>
          <div class="card-sub">各地区融资项目数量占比</div>
          <div id="regionChart"></div>
        </div>
      </div>

      <!-- 3 charts -->
      <div class="charts-grid-3">
        <div class="card">
          <div class="card-title">月度申请量</div>
          <div class="card-sub">申请 vs 通过对比</div>
          <div id="monthlyChart"></div>
        </div>
        <div class="card">
          <div class="card-title">品种类型分布</div>
          <div class="card-sub">质押品种作物种类占比</div>
          <div id="typeChart"></div>
        </div>
        <div class="card">
          <div class="card-title">融资成功率趋势</div>
          <div class="card-sub">近12个月审批通过率</div>
          <div id="successChart"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Finance trend
    const finChart = echarts.init(document.getElementById('financeChart'));
    const finData = {
      '2024': [1820,2340,1980,2650,3100,2800,3420,2960,3580,4100,3800,4500],
      '2023': [1200,1580,1350,1900,2200,1950,2400,2100,2600,2900,2700,3200],
    };
    function setFinChart(data){
      finChart.setOption({
        tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
        grid:{left:10,right:10,top:10,bottom:36,containLabel:true},
        xAxis:{type:'category',data:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],axisLine:{lineStyle:{color:'#e8f0ea'}},axisTick:{show:false},axisLabel:{color:'#8a9e94',fontSize:11}},
        yAxis:{type:'value',axisLabel:{color:'#8a9e94',fontSize:11},splitLine:{lineStyle:{color:'#f0f4f2',type:'dashed'}},axisLine:{show:false},axisTick:{show:false}},
        series:[{
          type:'line',smooth:true,data:data,
          lineStyle:{color:'#52b788',width:2.5},
          itemStyle:{color:'#52b788'},
          areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(82,183,136,0.3)'},{offset:1,color:'rgba(82,183,136,0)'}]}},
          symbol:'circle',symbolSize:5
        }]
      });
    }
    setFinChart(finData['2024']);

    // Region
    const regChart = echarts.init(document.getElementById('regionChart'));
    regChart.setOption({
      tooltip:{trigger:'item',formatter:'{b}: {c}项 ({d}%)'},
      series:[{
        type:'pie',radius:['38%','68%'],center:['50%','50%'],
        data:[
          {value:342,name:'西南地区',itemStyle:{color:'#52b788'}},
          {value:256,name:'华北地区',itemStyle:{color:'#2563eb'}},
          {value:198,name:'华东地区',itemStyle:{color:'#c9a84c'}},
          {value:234,name:'华南地区',itemStyle:{color:'#7c3aed'}},
          {value:204,name:'其他',itemStyle:{color:'#94a3b8'}}
        ],
        label:{formatter:'{b}\n{c}项',fontSize:11,color:'#4a6358'},
        emphasis:{scale:true,scaleSize:8}
      }]
    });

    // Monthly apply
    const monthChart = echarts.init(document.getElementById('monthlyChart'));
    monthChart.setOption({
      tooltip:{trigger:'axis'},
      legend:{data:['申请量','通过量'],bottom:0,textStyle:{fontSize:11,color:'#8a9e94'}},
      grid:{left:5,right:5,top:5,bottom:32,containLabel:true},
      xAxis:{type:'category',data:['8月','9月','10月','11月','12月','1月'],axisLine:{lineStyle:{color:'#e8f0ea'}},axisTick:{show:false},axisLabel:{color:'#8a9e94',fontSize:11}},
      yAxis:{type:'value',axisLabel:{color:'#8a9e94',fontSize:11},splitLine:{lineStyle:{color:'#f0f4f2',type:'dashed'}},axisLine:{show:false},axisTick:{show:false}},
      series:[
        {name:'申请量',type:'bar',data:[45,52,48,60,55,68],itemStyle:{color:'#b7e4c7',borderRadius:[4,4,0,0]},barMaxWidth:24},
        {name:'通过量',type:'bar',data:[38,44,40,52,48,58],itemStyle:{color:'#52b788',borderRadius:[4,4,0,0]},barMaxWidth:24}
      ]
    });

    // Type distribution
    const typeChart = echarts.init(document.getElementById('typeChart'));
    typeChart.setOption({
      tooltip:{trigger:'item'},
      series:[{
        type:'pie',radius:'62%',
        data:[
          {value:35,name:'水稻',itemStyle:{color:'#52b788'}},
          {value:28,name:'小麦',itemStyle:{color:'#c9a84c'}},
          {value:18,name:'玉米',itemStyle:{color:'#2563eb'}},
          {value:12,name:'大豆',itemStyle:{color:'#d97706'}},
          {value:7,name:'其他',itemStyle:{color:'#94a3b8'}}
        ],
        label:{formatter:'{b}\n{d}%',fontSize:11},
        emphasis:{scale:true,scaleSize:6}
      }]
    });

    // Success rate
    const successChart = echarts.init(document.getElementById('successChart'));
    successChart.setOption({
      tooltip:{trigger:'axis',formatter:'{b}: {c}%'},
      grid:{left:5,right:10,top:10,bottom:20,containLabel:true},
      xAxis:{type:'category',data:['2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月','1月'],axisLine:{show:false},axisTick:{show:false},axisLabel:{color:'#8a9e94',fontSize:10}},
      yAxis:{type:'value',min:80,max:100,axisLabel:{color:'#8a9e94',fontSize:10,formatter:'{value}%'},splitLine:{lineStyle:{color:'#f0f4f2',type:'dashed'}},axisLine:{show:false},axisTick:{show:false}},
      series:[{
        type:'line',smooth:true,
        data:[88,90,87,92,91,94,92,95,93,94,95,96],
        lineStyle:{color:'#2563eb',width:2},
        itemStyle:{color:'#2563eb'},
        areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(37,99,235,0.2)'},{offset:1,color:'rgba(37,99,235,0)'}]}},
        symbol:'circle',symbolSize:5
      }]
    });

    function updateCharts(year){
      if(finData[year]) setFinChart(finData[year]);
    }

    window.addEventListener('resize',()=>{
      [finChart,regChart,monthChart,typeChart,successChart].forEach(c=>c.resize());
    });
  </script>
</body>
</html>
