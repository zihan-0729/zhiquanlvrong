<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小智 — 智能问答</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --sidebar-bg: #1b3a2d; --sidebar-width: 260px;
      --green-dark: #1b4332; --green-mid: #2d6a4f; --green-light: #52b788;
      --green-pale: #b7e4c7; --gold: #c9a84c;
      --bg: #f0f4f2; --white: #ffffff;
      --text-dark: #1a2e23; --text-mid: #4a6358; --text-light: #8a9e94;
      --shadow: 0 2px 12px rgba(27,67,50,0.08);
      --blue: #2563eb; --red: #dc2626;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text-dark); display: flex; }

    /* ── Sidebar history ── */
    .sidebar {
      width: var(--sidebar-width); background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      border-right: 1px solid rgba(82,183,136,0.1);
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon { width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--green-light),var(--gold));display:flex;align-items:center;justify-content:center;font-size:16px;color:white; }
    .logo-text { font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;color:white; }
    .sidebar-new-btn {
      margin: 16px; padding: 10px 16px;
      background: rgba(82,183,136,0.15); border: 1px solid rgba(82,183,136,0.25);
      border-radius: 10px; color: var(--green-pale); font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s; font-family: inherit;
    }
    .sidebar-new-btn:hover { background: rgba(82,183,136,0.25); }
    .sidebar-section-label {
      padding: 4px 20px 10px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.3); font-weight: 600;
    }
    .sidebar-history { flex: 1; overflow-y: auto; padding: 0 12px; }
    .history-item {
      padding: 10px 12px; border-radius: 8px; cursor: pointer;
      margin-bottom: 3px; transition: background 0.2s;
    }
    .history-item:hover { background: rgba(255,255,255,0.05); }
    .history-item.active { background: rgba(82,183,136,0.15); }
    .history-item-title { font-size: 13px; color: rgba(255,255,255,0.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item-meta { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; }
    .sidebar-footer { padding: 16px; border-top: 1px solid rgba(255,255,255,0.06); }
    .sidebar-nav-item { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:rgba(255,255,255,0.55);font-size:13px;text-decoration:none;transition:all 0.2s;margin-bottom:2px; }
    .sidebar-nav-item:hover { background:rgba(82,183,136,0.1);color:rgba(255,255,255,0.9); }

    /* ── Main Chat ── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100%; }

    /* Header */
    .chat-header {
      height: 64px; background: white; border-bottom: 1px solid #e8f0ea;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px; flex-shrink: 0;
      box-shadow: 0 1px 6px rgba(27,67,50,0.05);
    }
    .chat-header-left { display: flex; align-items: center; gap: 12px; }
    .bot-avatar {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--green-light), var(--gold));
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .bot-name { font-size: 16px; font-weight: 700; color: var(--text-dark); }
    .bot-status { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .chat-header-right { display: flex; gap: 10px; }
    .hdr-btn {
      padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: none; font-family: inherit; transition: all 0.2s;
      display: flex; align-items: center; gap: 6px;
    }
    .hdr-btn-ghost { background: var(--bg); color: var(--text-mid); border: 1px solid #dde8e0; }
    .hdr-btn-ghost:hover { border-color: var(--green-light); color: var(--green-dark); }
    .hdr-btn-primary { background: linear-gradient(135deg, var(--green-light), var(--green-mid)); color: white; }

    /* Banner */
    #offline-banner {
      display: none; background: #fffbeb; border-bottom: 1px solid #fde68a;
      padding: 9px 24px; font-size: 12px; color: #92400e; text-align: center;
    }
    #offline-banner.show { display: block; }

    /* Messages area */
    #messages {
      flex: 1; overflow-y: auto; padding: 28px 0;
      display: flex; flex-direction: column; gap: 20px;
      background: #fafcfb;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #c8ddd0; border-radius: 3px; }

    .msg-row { display: flex; gap: 12px; padding: 0 28px; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .msg-row.bot .msg-avatar { background: linear-gradient(135deg, var(--green-light), var(--gold)); }
    .msg-row.user .msg-avatar { background: var(--green-dark); color: white; font-size: 13px; font-weight: 700; }
    .msg-content { max-width: 680px; display: flex; flex-direction: column; gap: 4px; }
    .msg-row.user .msg-content { align-items: flex-end; }
    .msg-name { font-size: 11px; color: var(--text-light); padding: 0 4px; }
    .bubble {
      padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.75;
    }
    .msg-row.bot .bubble {
      background: white; color: var(--text-dark); border: 1px solid rgba(27,67,50,0.07);
      border-top-left-radius: 4px; box-shadow: 0 1px 6px rgba(27,67,50,0.06);
    }
    .msg-row.user .bubble {
      background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
      color: white; border-top-right-radius: 4px;
      box-shadow: 0 2px 10px rgba(27,67,50,0.2);
    }
    .bubble ul { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble strong { font-weight: 700; }
    .bubble code { background: #f0f4f2; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; }
    .msg-time { font-size: 10px; color: var(--text-light); padding: 0 4px; }

    /* Welcome */
    .welcome-block { padding: 0 28px; }
    .welcome-card {
      background: white; border-radius: 18px; padding: 32px;
      border: 1px solid rgba(27,67,50,0.06); box-shadow: var(--shadow);
      text-align: center; max-width: 640px; margin: 0 auto;
    }
    .welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome-card h2 { font-family: 'Noto Serif SC', serif; font-size: 22px; font-weight: 700; color: var(--text-dark); margin-bottom: 10px; }
    .welcome-card p { font-size: 14px; color: var(--text-mid); line-height: 1.8; margin-bottom: 24px; }
    .capabilities { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .cap-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; background: var(--bg); border-radius: 10px;
      font-size: 13px; color: var(--text-mid);
    }
    .cap-item i { color: var(--green-light); width: 16px; }
    .quick-title { font-size: 12px; color: var(--text-light); margin-bottom: 10px; letter-spacing: 0.5px; }
    .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .quick-chip {
      padding: 7px 14px; background: white; border: 1.5px solid #c8ddd0;
      border-radius: 20px; font-size: 12px; color: var(--green-mid);
      cursor: pointer; font-family: inherit; transition: all 0.2s; font-weight: 500;
    }
    .quick-chip:hover { background: var(--green-mid); color: white; border-color: var(--green-mid); transform: translateY(-1px); }

    /* Typing */
    .typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
    .typing-dots span {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green-light);
      animation: tdot 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }

    /* Error */
    .err-bubble {
      background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
      padding: 10px 14px; font-size: 13px; color: #dc2626; max-width: 500px;
    }

    /* Copy btn */
    .msg-actions { display: flex; gap: 6px; margin-top: 4px; }
    .msg-action-btn {
      width: 26px; height: 26px; border-radius: 6px; border: none; cursor: pointer;
      background: white; border: 1px solid #e8f0ea; display: flex; align-items: center;
      justify-content: center; font-size: 11px; color: var(--text-light);
      transition: all 0.2s;
    }
    .msg-action-btn:hover { background: var(--bg); color: var(--green-mid); }

    /* ── Input ── */
    .input-section { background: white; border-top: 1px solid #e8f0ea; padding: 16px 28px; flex-shrink: 0; }
    .input-box {
      max-width: 800px; margin: 0 auto;
      background: var(--bg); border-radius: 14px; border: 1.5px solid transparent;
      padding: 12px 14px; display: flex; align-items: flex-end; gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within { border-color: var(--green-light); background: white; box-shadow: 0 0 0 3px rgba(82,183,136,0.1); }
    #main-textarea {
      flex: 1; border: none; background: none; resize: none;
      font-size: 14px; color: var(--text-dark); font-family: inherit;
      outline: none; max-height: 140px; line-height: 1.6; padding: 0;
    }
    #main-textarea::placeholder { color: var(--text-light); }
    .input-actions { display: flex; gap: 6px; align-items: center; }
    .send-btn {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, var(--green-light), var(--green-mid));
      border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; box-shadow: 0 2px 10px rgba(82,183,136,0.3);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 4px 14px rgba(82,183,136,0.4); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .input-footer { max-width: 800px; margin: 8px auto 0; display: flex; justify-content: space-between; font-size: 11px; color: var(--text-light); }
    .model-tag { display: flex; align-items: center; gap: 5px; }
    .model-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green-light); }
  </style>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <img src="logo.png" alt="项目logo" style="width: 36px; height: 36px; border-radius: 10px; object-fit: cover;">
      <span class="logo-text">智权绿融</span>
    </div>
    <button class="sidebar-new-btn" id="new-chat-btn">
      <i class="fas fa-plus"></i> 新建对话
    </button>
    <div class="sidebar-section-label">历史对话</div>
    <div class="sidebar-history" id="sidebar-history">
      <div class="history-item active">
        <div class="history-item-title">融资申请相关问题</div>
        <div class="history-item-meta">今天 · 4条消息</div>
      </div>
      <div class="history-item">
        <div class="history-item-title">品种权价值评估方法</div>
        <div class="history-item-meta">昨天 · 7条消息</div>
      </div>
      <div class="history-item">
        <div class="history-item-title">质押合同条款解读</div>
        <div class="history-item-meta">2天前 · 3条消息</div>
      </div>
    </div>
    <div class="sidebar-footer">
      <a href="dashboard.html" class="sidebar-nav-item"><i class="fas fa-th-large"></i> 工作台总览</a>
      <a href="apply.html" class="sidebar-nav-item"><i class="fas fa-file-alt"></i> 融资申请</a>
      <a href="index.html" class="sidebar-nav-item"><i class="fas fa-home"></i> 返回首页</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- Header -->
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="bot-avatar">🌱</div>
        <div>
          <div class="bot-name">小智</div>
          <div class="bot-status"><span class="status-dot"></span>在线 · 植物新品种权质押融资专属顾问</div>
        </div>
      </div>
      <div class="chat-header-right">
        <button class="hdr-btn hdr-btn-ghost" id="clear-btn"><i class="fas fa-redo-alt"></i> 清空对话</button>
        <button class="hdr-btn hdr-btn-ghost" id="export-btn"><i class="fas fa-download"></i> 导出记录</button>
        <button class="hdr-btn hdr-btn-primary" onclick="window.location.href='apply.html'"><i class="fas fa-arrow-right"></i> 去申请融资</button>
      </div>
    </div>

    <div id="offline-banner">⚠️ 未连接到后端服务（localhost:5000），请先运行 <code>python app.py</code> 启动代理服务器</div>

    <!-- Messages -->
    <div id="messages">
      <div class="welcome-block">
        <div class="welcome-card">
          <div class="welcome-icon">🌾</div>
          <h2>您好，我是小智</h2>
          <p>专注于植物新品种权质押融资领域的智能顾问，可为您解答融资申请、价值评估、法律风控、农业政策等专业问题。</p>
          <div class="capabilities">
            <div class="cap-item"><i class="fas fa-file-alt"></i>融资申请指导</div>
            <div class="cap-item"><i class="fas fa-chart-bar"></i>价值评估解读</div>
            <div class="cap-item"><i class="fas fa-shield-alt"></i>法律风控咨询</div>
            <div class="cap-item"><i class="fas fa-leaf"></i>农业政策资讯</div>
          </div>
          <div class="quick-title">常见问题 · 点击即可提问</div>
          <div class="quick-chips" id="quick-chips"></div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-section">
      <div class="input-box">
        <textarea id="main-textarea" placeholder="输入您的问题，例如：植物新品种权质押融资需要什么条件？" rows="1"></textarea>
        <div class="input-actions">
          <button class="send-btn" id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
          </button>
        </div>
      </div>
      <div class="input-footer">
        <span>Enter 发送 · Shift+Enter 换行</span>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/chat';
    const SYSTEM_PROMPT = `你是"小智"，智权绿融平台的专属AI助手。智权绿融是一个专注于植物新品种权质押融资的数字化服务平台，面向种业中小企业提供融资申请、价值评估、法律风控和数据分析等服务。

你的职责：
1. 解答用户关于植物新品种权质押融资的问题
2. 指导用户完成融资申请流程（企业信息→品种资料→融资需求→提交审核）
3. 解释价值评估方法（市场收益法、评估指标含义）
4. 普及相关法律知识（品种权保护、质押合同、合规要求）
5. 解读平台数据和功能模块
6. 提供农业金融政策资讯

回答风格：专业、简洁、友好。适当使用数字列表和分点说明。遇到具体金融决策建议提示用户咨询专业顾问。`;

    const QUICK_QUESTIONS = [
      '植物新品种权质押融资需要什么条件？',
      '品种权价值如何评估？评估方法有哪些？',
      '融资申请需要准备哪些材料？',
      '质押融资的利率一般是多少？',
      '品种权授权到期后质押贷款怎么处理？',
      '什么情况会触发风险预警？',
      '如何加快融资申请审批速度？',
      '我国有哪些支持种业融资的政策？',
    ];

    // Render quick chips
    const chipsEl = document.getElementById('quick-chips');
    QUICK_QUESTIONS.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'quick-chip';
      btn.textContent = q;
      btn.onclick = () => sendMessage(q);
      chipsEl.appendChild(btn);
    });

    const messagesEl = document.getElementById('messages');
    const textarea = document.getElementById('main-textarea');
    const sendBtn = document.getElementById('send-btn');
    const offlineBanner = document.getElementById('offline-banner');

    let history = [{ role: 'system', content: SYSTEM_PROMPT }];
    let isStreaming = false;

    // Auto-resize textarea
    textarea.addEventListener('input', () => {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
    });
    textarea.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', () => sendMessage());

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (isStreaming) return;
      if (!confirm('确定清空当前对话？')) return;
      history = [{ role: 'system', content: SYSTEM_PROMPT }];
      location.reload();
    });

    document.getElementById('new-chat-btn').addEventListener('click', () => {
      if (isStreaming) return;
      history = [{ role: 'system', content: SYSTEM_PROMPT }];
      location.reload();
    });

    document.getElementById('export-btn').addEventListener('click', () => {
      const lines = history.filter(m => m.role !== 'system').map(m =>
        `[${m.role === 'user' ? '用户' : '小智'}]\n${m.content}\n`
      ).join('\n---\n\n');
      const blob = new Blob([`小智 对话记录\n导出时间：${new Date().toLocaleString('zh-CN')}\n\n${'='.repeat(40)}\n\n${lines}`], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `小智对话记录_${Date.now()}.txt`;
      a.click();
    });

    function getTime() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function escHtml(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderMd(raw) {
      let h = escHtml(raw);
      h = h.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
      h = h.replace(/^(\d+)\.\s(.+)$/gm, '<li>$2</li>');
      h = h.replace(/^[-•]\s(.+)$/gm, '<li>$1</li>');
      h = h.replace(/((<li>.*?<\/li>\n?)+)/gs, '<ul>$1</ul>');
      h = h.replace(/\n/g, '<br>');
      return h;
    }

    function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

    function addUserMsg(text) {
      const div = document.createElement('div');
      div.className = 'msg-row user';
      div.innerHTML = `
        <div class="msg-content">
          <div class="msg-name" style="text-align:right">您</div>
          <div class="bubble">${escHtml(text)}</div>
          <div class="msg-time">${getTime()}</div>
        </div>
        <div class="msg-avatar">我</div>`;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function addTyping() {
      const div = document.createElement('div');
      div.className = 'msg-row bot';
      div.id = 'typing-row';
      div.innerHTML = `
        <div class="msg-avatar">🌱</div>
        <div class="msg-content">
          <div class="msg-name">小智</div>
          <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
        </div>`;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function addBotMsg() {
      document.getElementById('typing-row')?.remove();
      const div = document.createElement('div');
      div.className = 'msg-row bot';
      div.innerHTML = `
        <div class="msg-avatar">🌱</div>
        <div class="msg-content">
          <div class="msg-name">小智</div>
          <div class="bubble" id="stream-bubble"></div>
          <div class="msg-time" id="stream-time"></div>
        </div>`;
      messagesEl.appendChild(div);
      scrollBottom();
      return document.getElementById('stream-bubble');
    }

    function addErrMsg(msg) {
      document.getElementById('typing-row')?.remove();
      const div = document.createElement('div');
      div.className = 'msg-row bot';
      div.innerHTML = `
        <div class="msg-avatar">🌱</div>
        <div class="err-bubble">⚠️ ${escHtml(msg)}</div>`;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    async function sendMessage(overrideText) {
      const text = (overrideText || textarea.value).trim();
      if (!text || isStreaming) return;

      if (!overrideText) { textarea.value = ''; textarea.style.height = 'auto'; }

      isStreaming = true;
      sendBtn.disabled = true;
      textarea.disabled = true;

      addUserMsg(text);
      history.push({ role: 'user', content: text });
      addTyping();

      let full = '';
      let bubble = null;

      try {
        const resp = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history }),
          signal: AbortSignal.timeout(60000),
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        offlineBanner.classList.remove('show');

        const reader = resp.body.getReader();
        const dec = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const lines = dec.decode(value, { stream: true }).split('\n');
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') break;
            try {
              const p = JSON.parse(data);
              if (p.error) throw new Error(p.error);
              if (p.content) {
                if (!bubble) bubble = addBotMsg();
                full += p.content;
                bubble.innerHTML = renderMd(full);
                scrollBottom();
              }
            } catch(e) { if (e.message !== 'Unexpected end of JSON input') throw e; }
          }
        }

        if (!bubble) addErrMsg('未收到回复，请重试。');
        else {
          history.push({ role: 'assistant', content: full });
          // Finalize
          document.getElementById('stream-time').textContent = getTime();
          bubble.removeAttribute('id');
          document.getElementById('stream-time')?.removeAttribute('id');

          // Add copy button
          const actions = document.createElement('div');
          actions.className = 'msg-actions';
          
          const copyBtn = document.createElement('button');
          copyBtn.className = 'msg-action-btn';
          copyBtn.title = '复制';
          copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
          
          // 安全地绑定点击事件
          copyBtn.onclick = () => {
            navigator.clipboard.writeText(full).then(() => {
              copyBtn.innerHTML = '<i class="fas fa-check"></i>';
              setTimeout(() => { 
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>'; 
              }, 1500);
            });
          };
          
          actions.appendChild(copyBtn);
          bubble.closest('.msg-content').appendChild(actions);
        }

      } catch(err) {
        offlineBanner.classList.add('show');
        if (err.name === 'TypeError' || err.message.includes('fetch')) {
          addErrMsg('无法连接后端，请先运行 python app.py');
        } else {
          addErrMsg('请求失败：' + err.message);
        }
        history.pop();
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        textarea.disabled = false;
        textarea.focus();
      }
    }
  </script>
</body>
</html>
